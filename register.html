<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Register</title>

<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Inter', sans-serif;
}

/* MAIN CONTAINER */
.container {
    display: flex;
    height: 100vh;
}

/* LEFT IMAGE */
.left {
    width: 50%;
    background: linear-gradient(to bottom, #f4f7fb, #eef2f7);
    display: flex;
    justify-content: center;
    align-items: center;
}

.left img {
    width: 80%;
}

/* RIGHT FORM */
.right {
    width: 50%;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #eef2f7;
}

.form-box {
    width: 320px;
    text-align: center;
}

h2 {
    margin-bottom: 20px;
}

/* INPUT */
input {
    width: 100%;
    padding: 12px;
    margin-bottom: 12px;
    border-radius: 8px;
    border: 1px solid #ccc;
    background: #fff;
    outline: none;
}

/* BUTTON */
button {
    width: 100%;
    padding: 12px;
    background: linear-gradient(to right, #3b82f6, #60a5fa);
    color: white;
    border: none;
    border-radius: 8px;
    cursor: pointer;
}

/* LINK */
a {
    display: block;
    margin-top: 12px;
    color: #3b82f6;
    text-decoration: none;
}

/* MOBILE */
@media(max-width: 768px) {
    .left {
        display: none;
    }
    .right {
        width: 100%;
    }
}
</style>
</head>

<body>

<div class="container">

    <!-- LEFT IMAGE -->
    <div class="left">
        <img src="{{ url_for('static', filename='fake-news-detection.webp') }}">
    </div>

    <!-- RIGHT FORM -->
    <div class="right">
        <div class="form-box">

            <h2>Create Account</h2>

            <form method="POST">

                <input type="text" name="name" placeholder="Full Name" required>
                <input type="email" name="email" placeholder="Email Address" required>
                <input type="password" name="password" placeholder="Password" required>
                <input type="text" name="mobile" placeholder="Mobile Number" required>

                <!-- ✅ FIXED -->
                <button type="submit">Register</button>

            </form>

            <!-- ✅ FIXED -->
            <a href="/login">Already have an account? Login</a>

        </div>
    </div>

</div>

</body>
</html>
